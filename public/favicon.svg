<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E29C" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="60%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0A0A0A" />
  <circle cx="50" cy="50" r="38" fill="url(#gold)" filter="url(#glow)" />
  <circle cx="50" cy="50" r="32" fill="none" stroke="#222" stroke-width="2" stroke-dasharray="4,4" opacity="0.3" />
  <text x="50" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="900" fill="#111" text-anchor="middle">G</text>
</svg>
